{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BR_ALPHA{% endblock %}</title>

    <!-- Стили для страниц авторизации -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/toast.css' %}">

    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    {% block extra_css %}{% endblock %}
</head>
<body class="auth-body">
    {% block content %}{% endblock %}

    {% if messages %}
    <div id="toast-container">
        {% for message in messages %}
            <div class="toast {% if message.tags %}{{ message.tags }}{% endif %}">
                <i class="fas {% if message.tags == 'success' %}fa-check-circle{% elif message.tags == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                {{ message }}
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <script src="{% static 'js/toast.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
